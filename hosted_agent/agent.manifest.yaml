# Azure AI Foundry Hosted Agent manifest
# Used by: azd ai agent init / azd deploy
# Docs: https://learn.microsoft.com/azure/foundry/agents/quickstarts/quickstart-hosted-agent

name: helpdesk-langgraph-agent
description: "IT Helpdesk agent built with LangGraph, connecting to helpdesk tools via MCP"
tags:
  - AI Agent Hosting
  - Responses Protocol
  - LangGraph
  - LangChain
  - MCP

template:
  kind: hosted
  protocol:
    type: responses
    version: "1.0.0"

# Environment variables the agent needs.
# FOUNDRY_PROJECT_ENDPOINT and APPLICATIONINSIGHTS_CONNECTION_STRING
# are injected automatically by the platform.
environment:
  - name: AZURE_AI_MODEL_DEPLOYMENT_NAME
    description: Name of the model deployment in your Foundry project
    required: true
  - name: MCP_SERVER_URL
    description: URL of the helpdesk MCP server (Azure Function App)
    required: true
  - name: MCP_SERVER_KEY
    description: Azure Function App host key for the MCP server
    required: false
  - name: AZURE_AI_PROJECT_KEY
    description: API key for the Foundry project
    required: true

resources:
  model:
    id: gpt-5.2
    envVarName: AZURE_AI_MODEL_DEPLOYMENT_NAME
